<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Durood Counter</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{

            --emerald-dark:#123524;
            --emerald:#1E4D2D;
            --emerald-light:#2E6B45;

            --gold-dark:#8B6A18;
            --gold:#C8A64B;
            --gold-light:#F4DE8A;

            --ivory:#F8F5EC;

        }

        body{

            min-height:100vh;

            display:flex;

            align-items:center;

            justify-content:center;

            background:
                linear-gradient(
                    rgba(18,53,36,.84),
                    rgba(18,53,36,.84)
                );

            background-size:cover;

            font-family:'Segoe UI',sans-serif;

            padding:20px;

        }

        .overlay{

            width:100%;

            max-width:460px;

            background:rgba(29,73,45,.90);

            border:1px solid rgba(200,166,75,.35);

            border-radius:22px;

            padding:2rem;

            backdrop-filter:blur(14px);

            box-shadow:
                0 18px 40px rgba(0,0,0,.45),
                inset 0 0 0 1px rgba(255,255,255,.04);

        }

        h1{

            color:var(--ivory);

            font-weight:700;

            margin-bottom:.3rem;

        }

        h5{

            color:var(--gold-light);

            font-weight:700;

        }

        h6{

            color:#E9E4D4;

            line-height:1.7;

            margin-bottom:28px;

        }

        .title-highlight{

            background:linear-gradient(
                90deg,
                #8B6A18,
                #C8A64B,
                #F4DE8A,
                #FFF5C8,
                #F4DE8A,
                #C8A64B,
                #8B6A18
            );

            background-size:300%;

            -webkit-background-clip:text;

            -webkit-text-fill-color:transparent;

            animation:goldShine 5s linear infinite;

            font-weight:800;

        }

        @keyframes goldShine{

            from{

                background-position:0%;

            }

            to{

                background-position:300%;

            }

        }

        label{

            color:var(--ivory);

            font-weight:500;

            margin-bottom:8px;

        }

        .form-control{

            background:#214B30;

            border:1px solid rgba(200,166,75,.40);

            color:white;

            border-radius:12px;

            padding:13px 48px 13px 14px;

        }

        .form-control::placeholder{

            color:#D6D6D6;

        }

        .form-control:focus{

            background:#28563A;

            color:white;

            border-color:var(--gold-light);

            box-shadow:0 0 0 .2rem rgba(200,166,75,.18);

        }

        .password-wrapper{

            position:relative;

        }

        .password-toggle{

            position:absolute;

            right:15px;

            top:50%;

            transform:translateY(-50%);

            border:none;

            background:none;

            color:var(--gold-light);

            cursor:pointer;

            font-size:18px;

        }

        .password-toggle:hover{

            color:white;

        }

        .password-toggle:focus{

            outline:none;

            box-shadow:none;

        }

        .form-check{

            margin-top:5px;

        }

        .form-check-input{

            background:#214B30;

            border:1px solid rgba(200,166,75,.45);

            cursor:pointer;

        }

        .form-check-input:checked{

            background:var(--gold);

            border-color:var(--gold);

        }

        .form-check-label{

            color:var(--ivory);

            cursor:pointer;

            user-select:none;

            margin-left:5px;

        }

        .btn-custom{

            background:linear-gradient(
                90deg,
                #8B6A18,
                #C8A64B,
                #F4DE8A
            );

            color:#183522;

            border:none;

            border-radius:12px;

            font-weight:700;

            padding:12px;

            transition:.3s;

        }

        .btn-custom:hover{

            transform:translateY(-2px);

            filter:brightness(1.05);

            box-shadow:0 0 18px rgba(239,217,139,.55);

        }

        p{

            color:var(--ivory);

            margin-top:24px;

            margin-bottom:0;

        }

        a{

            color:var(--gold-light);

            text-decoration:none;

            font-weight:600;

        }

        a:hover{

            color:white;

        }

        @media(max-width:576px){

            .overlay{

                padding:1.6rem;

            }

            h1{

                font-size:1.45rem;

            }

            h6{

                font-size:.92rem;

            }

        }

    </style>

</head>

<body>

<div class="overlay text-center">
        <h1 class="mb-2">
        1501 years of
        <span class="title-highlight">MAWLID</span>
    </h1>

    <h6>
        BE THE ONE AMONG THE CLOSEST TO THE PROPHET ﷺ
    </h6>

    <h5 class="fw-bold mb-4">
        Login
    </h5>

    <form method="POST" action="/login">

        <div class="mb-3 text-start">

            <label for="mobile" class="form-label">
                Mobile Number
            </label>

           <input
                type="tel"
                class="form-control"
                id="mobile"
                name="mobile"
                maxlength="10"
                pattern="[0-9]{10}"
                oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)"
                required>

        </div>

        <div class="mb-3 text-start">

            <label for="password" class="form-label">
                Password
            </label>

            <div class="password-wrapper">

                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required>

                <button
                    type="button"
                    class="password-toggle"
                    onclick="togglePassword()">

                    <i
                        id="toggleIcon"
                        class="fa-solid fa-eye">
                    </i>

                </button>

            </div>

        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div class="form-check">

                <input
                    class="form-check-input"
                    type="checkbox"
                    id="remember"
                    name="remember">

                <label
                    class="form-check-label"
                    for="remember">

                    Remember Me

                </label>

            </div>

        </div>

        <button
            type="submit"
            class="btn btn-custom w-100">

            Login

        </button>

    </form>

    <p>

        Don't have an account?

        <a href="/register">

            Register

        </a>

    </p>

</div>

<script>

function togglePassword(){

    const password=document.getElementById("password");

    const icon=document.getElementById("toggleIcon");

    if(password.type==="password"){

        password.type="text";

        icon.classList.remove("fa-eye");

        icon.classList.add("fa-eye-slash");

    }

    else{

        password.type="password";

        icon.classList.remove("fa-eye-slash");

        icon.classList.add("fa-eye");

    }

}

</script>

</body>

</html>
